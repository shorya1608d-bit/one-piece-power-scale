const hTxt = ["None", "Normal", "Advanced"];
const cTxt = ["None", "Normal", "Infusion"];
const fTxt = ["None", "Normal", "Awakened"];
const names = Object.keys(db).sort();

const s1 = document.getElementById('p1'), s2 = document.getElementById('p2');
names.forEach(n => { s1.add(new Option(n, n)); s2.add(new Option(n, n)); });

function render() {
    document.getElementById('outcome').style.display = 'none';
    buildCard('c1', s1.value); buildCard('c2', s2.value);
}

function buildCard(id, char) {
    const c = db[char], el = document.getElementById(id);
    el.style.visibility = 'visible';
    
    // Haki display classes
    const oC = c[4]===2?'val-adv':c[4]===1?'val-norm':'val-none';
    const aC = c[5]===2?'val-adv':c[5]===1?'val-norm':'val-none';
    const cC = c[6]===2?'val-adv':c[6]===1?'val-norm':'val-none';
    const fC = c[7]===2?'val-adv':c[7]===1?'val-norm':'val-none';

    el.innerHTML = `
        <div class="name-plate">${char}</div>
        <div class="ability-grid">
            <div class="ability-item"><span class="ability-title">Observation</span><span class="ability-val ${oC}">${hTxt[c[4]]}</span></div>
            <div class="ability-item"><span class="ability-title">Armament</span><span class="ability-val ${aC}">${hTxt[c[5]]}</span></div>
            <div class="ability-item"><span class="ability-title">Conqueror's</span><span class="ability-val ${cC}">${cTxt[c[6]]}</span></div>
            <div class="ability-item"><span class="ability-title">Devil Fruit</span><span class="ability-val ${fC}">${fTxt[c[7]]}</span></div>
        </div>
        ${bar("Attack Power", c[0])}
        ${bar("Speed", c[1])}
        ${bar("Durability", c[2])}
        ${bar("Battle IQ", c[3])}
    `;
    setTimeout(() => el.querySelectorAll('.bar-fill').forEach(b => b.style.width = b.getAttribute('data-v') + '%'), 50);
}

function bar(lbl, val) {
    return `<div class="stat-row"><div class="stat-labels"><span>${lbl}</span><span>${val}%</span></div>
    <div class="bar-bg"><div class="bar-fill" data-v="${val}"></div></div></div>`;
}

function calculate() {
    const p1 = s1.value, p2 = s2.value; if(p1 === p2) return;
    
    const score1 = db[p1][0] + db[p1][1] + db[p1][2] + db[p1][3] + (db[p1][4]*10) + (db[p1][5]*15) + (db[p1][6]*20) + (db[p1][7]*10) + Math.random()*15;
    const score2 = db[p2][0] + db[p2][1] + db[p2][2] + db[p2][3] + (db[p2][4]*10) + (db[p2][5]*15) + (db[p2][6]*20) + (db[p2][7]*10) + Math.random()*15;
    
    const win = score1 > score2 ? p1 : p2;
    document.getElementById('outcome').style.display = 'block';
    document.getElementById('outTitle').innerText = win.toUpperCase() + " VICTORIOUS";
    document.getElementById('outDesc').innerText = db[win][8];
}

// Init
s2.selectedIndex = 1;
render();
